<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafePlay - متجر حسابات الألعاب الآمن</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #121212);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #aaaaaa);
            --button-color: var(--tg-theme-button-color, #4f46e5);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --card-bg: #1e1e1e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        header h1 {
            margin: 0 0 5px 0;
            font-size: 24px;
            color: #6366f1;
        }
        header p {
            margin: 0;
            color: var(--hint-color);
            font-size: 14px;
        }
        .search-box {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #333;
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 14px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .product-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 14px;
            border: 1px solid #2d2d2d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .product-info h3 {
            margin: 0 0 5px 0;
            font-size: 16px;
        }
        .product-info p {
            margin: 0;
            font-size: 13px;
            color: var(--hint-color);
        }
        .product-price {
            font-weight: bold;
            color: #10b981;
            font-size: 16px;
        }
        .buy-btn {
            background-color: var(--button-color);
            color: var(--button-text-color);
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎮 SafePlay Store</h1>
        <p>منصة تداول حسابات الألعاب الآمنة المدعومة بالذكاء الاصطناعي</p>
    </header>

    <input type="text" class="search-box" placeholder="ابحث عن حساب (Steam, Roblox, WoW)...">

    <div class="products-grid">
        <div class="product-card">
            <div class="product-info">
                <h3>حساب Steam مميز - ليفل عالي</h3>
                <p>مؤمن بالكامل + ضمان ذهبي</p>
                <button class="buy-btn" onclick="buyItem('Steam Account #1', 45)">شراء (45$)</button>
            </div>
            <div class="product-price">45$</div>
        </div>

        <div class="product-card">
            <div class="product-info">
                <h3>حساب World of Warcraft - ليفل 80</h3>
                <p>شخصية قوية + إنجازات نادرة</p>
                <button class="buy-btn" onclick="buyItem('WoW Account #2', 75)">شراء (75$)</button>
            </div>
            <div class="product-price">75$</div>
        </div>

        <div class="product-card">
            <div class="product-info">
                <h3>حساب Roblox نادر</h3>
                <p>ملابس وسకిنزات قديمة نادرة</p>
                <button class="buy-btn" onclick="buyItem('Roblox Account #3', 30)">شراء (30$)</button>
            </div>
            <div class="product-price">30$</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function buyItem(itemName, price) {
            tg.MainButton.text = `إتمام شراء: ${itemName} (${price}$)`;
            tg.MainButton.show();
            tg.MainButton.onClick(function(){
                alert(`تم استلام طلبك لـ ${itemName} بنجاح! سيتم تحويلك لبوابة الدفع الآمنة.`);
                tg.close();
            });
        }
    </script>
</body>
</html>
